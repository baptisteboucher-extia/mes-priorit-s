<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionnaire de Tâches Baptiste</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyByiE0ris5sb4yu1GpU4UVeaCJc4j5OjqG",
    authDomain: "matrice-de-prio.firebaseapp.com",
    projectId: "matrice-de-prio",
    storageBucket: "matrice-de-prio.firebasestorage.app",
    messagingSenderId: "167746318009",
    appId: "1:167746318009:web:46c2fa8593dd224f837568"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const tasksCol = collection(db, "tasks3");

  const CATEGORIES = ['Business', 'RH', 'AD', 'Autres'];
  const PRIO = {
    haute:   { label: 'Haute',   color: '#e8544a', bg: '#fde8e7' },
    moyenne: { label: 'Moyenne', color: '#f59e0b', bg: '#fef3c7' },
    basse:   { label: 'Basse',   color: '#6bbf8e', bg: '#e8f5ee' },
  };
  const OWNERS = { Baptiste: '#6366f1', Nicolas: '#f59e0b', Antoine: '#10b981' };

  let pendingDeleteId = null;

  function formatDate(d) {
    if (!d) return null;
    const [y,m,j] = d.split('-');
    return `${j}/${m}/${y}`;
  }

  function dateStatus(d) {
    if (!d) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const t = new Date(d); t.setHours(0,0,0,0);
    const diff = (t - today) / 86400000;
    if (diff < 0)  return 'expired';
    if (diff <= 1) return 'soon';
    return 'ok';
  }

  // ── ADD ──────────────────────────────────────────
  window.openAdd = function(cat) {
    document.getElementById('addModal').classList.add('visible');
    document.getElementById('addForm').reset();
    document.getElementById('addCat').value = cat || CATEGORIES[0];
  };
  window.closeAdd = () => document.getElementById('addModal').classList.remove('visible');

  window.submitAdd = async function() {
    const text = document.getElementById('addText').value.trim();
    if (!text) { document.getElementById('addText').focus(); return; }
    await addDoc(tasksCol, {
      text,
      category:  document.getElementById('addCat').value,
      priority:  document.getElementById('addPrio').value,
      owner:     document.getElementById('addOwner').value || null,
      deadline:  document.getElementById('addDeadline').value || null,
      comment:   document.getElementById('addComment').value.trim() || null,
      done:      false,
      createdAt: Date.now()
    });
    closeAdd();
  };

  // ── EDIT ─────────────────────────────────────────
  window.openEdit = function(t) {
    document.getElementById('editModal').classList.add('visible');
    document.getElementById('editId').value       = t.id;
    document.getElementById('editText').value     = t.text;
    document.getElementById('editCat').value      = t.category;
    document.getElementById('editPrio').value     = t.priority || 'moyenne';
    document.getElementById('editOwner').value    = t.owner || '';
    document.getElementById('editDeadline').value = t.deadline || '';
    document.getElementById('editComment').value  = t.comment || '';
  };
  window.closeEdit = () => document.getElementById('editModal').classList.remove('visible');

  window.submitEdit = async function() {
    const id = document.getElementById('editId').value;
    await updateDoc(doc(db, "tasks3", id), {
      text:     document.getElementById('editText').value.trim(),
      category: document.getElementById('editCat').value,
      priority: document.getElementById('editPrio').value,
      owner:    document.getElementById('editOwner').value || null,
      deadline: document.getElementById('editDeadline').value || null,
      comment:  document.getElementById('editComment').value.trim() || null,
    });
    closeEdit();
  };

  // ── DELETE ────────────────────────────────────────
  window.confirmDelete = function(id, text) {
    pendingDeleteId = id;
    document.getElementById('confirmMsg').textContent = `Supprimer "${text}" ?`;
    document.getElementById('confirmModal').classList.add('visible');
  };
  window.cancelDelete = () => { pendingDeleteId = null; document.getElementById('confirmModal').classList.remove('visible'); };
  window.doDelete = async function() {
    if (pendingDeleteId) await deleteDoc(doc(db, "tasks3", pendingDeleteId));
    cancelDelete();
  };

  // ── DONE ─────────────────────────────────────────
  window.toggleDone = async function(id, current) {
    await updateDoc(doc(db, "tasks3", id), { done: !current });
  };

  // ── RENDER ────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('addText').addEventListener('keydown', e => { if (e.key === 'Enter') window.submitAdd(); });
    document.getElementById('editText').addEventListener('keydown', e => { if (e.key === 'Enter') window.submitEdit(); });

    onSnapshot(tasksCol, snap => {
      const tasks = [];
      snap.forEach(d => tasks.push({ id: d.id, ...d.data() }));
      render(tasks);
      document.getElementById('sync').textContent = '🟢 Synchronisé';
    });
  });

  function render(tasks) {
    CATEGORIES.forEach(cat => {
      const catTasks = tasks
        .filter(t => t.category === cat)
        .sort((a, b) => {
          const order = { haute: 0, moyenne: 1, basse: 2 };
          return (order[a.priority] ?? 1) - (order[b.priority] ?? 1) || (a.createdAt || 0) - (b.createdAt || 0);
        });

      const list  = document.getElementById(`list-${cat}`);
      const badge = document.getElementById(`badge-${cat}`);
      const remaining = catTasks.filter(t => !t.done).length;
      badge.textContent = remaining || '';
      badge.style.display = remaining ? 'inline-flex' : 'none';
      list.innerHTML = '';

      catTasks.forEach(t => {
        const p  = PRIO[t.priority] || PRIO.moyenne;
        const ds = dateStatus(t.deadline);

        const card = document.createElement('div');
        card.className = 'card' + (t.done ? ' done' : '');

        // Priorité dot + texte + actions
        const top = document.createElement('div');
        top.className = 'card-top';
        top.innerHTML = `
          <span class="prio-dot" style="background:${p.color}" title="${p.label}"></span>
          <span class="card-text">${t.text}</span>
          <div class="card-actions">
            <button class="btn-icon" title="Modifier" onclick='openEdit(${JSON.stringify(t)})'>✏️</button>
            <button class="btn-icon del" title="Supprimer" onclick="confirmDelete('${t.id}','${t.text.replace(/'/g,"\\'").replace(/"/g,'\\"')}')">×</button>
          </div>
        `;

        // Meta : owner + deadline
        const meta = document.createElement('div');
        meta.className = 'card-meta';
        if (t.owner) {
          const ow = document.createElement('span');
          ow.className = 'owner';
          ow.textContent = t.owner;
          ow.style.cssText = `background:${OWNERS[t.owner] || '#888'}22;color:${OWNERS[t.owner] || '#888'}`;
          meta.appendChild(ow);
        }
        if (t.deadline) {
          const dl = document.createElement('span');
          dl.className = `deadline ${ds}`;
          const icon = ds === 'expired' ? '⚠️' : ds === 'soon' ? '🔔' : '📅';
          dl.textContent = `${icon} ${formatDate(t.deadline)}`;
          meta.appendChild(dl);
        }

        // Checkbox done
        const check = document.createElement('label');
        check.className = 'check-label';
        check.innerHTML = `<input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleDone('${t.id}',${t.done})"> <span>${t.done ? 'Terminée' : 'Marquer comme fait'}</span>`;

        meta.appendChild(check);

        // Comment
        const comment = t.comment ? document.createElement('div') : null;
        if (comment) { comment.className = 'card-comment'; comment.textContent = `💬 ${t.comment}`; }

        card.appendChild(top);
        if (t.owner || t.deadline || true) card.appendChild(meta);
        if (comment) card.appendChild(comment);
        list.appendChild(card);
      });

      if (catTasks.length === 0) {
        list.innerHTML = '<p class="empty">Aucune tâche · <button onclick="openAdd(\'' + cat + '\')">+ Ajouter</button></p>';
      }
    });
  }
</script>

<style>
  :root {
    --bg: #f5f3ef;
    --white: #fff;
    --text: #1a1a1a;
    --muted: #999;
    --border: #e4dfd8;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: #1a1a1a;
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; flex: 1; }
  #sync { font-size: 0.75rem; color: #888; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 24px 28px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── COLUMN ── */
  .col {
    background: var(--white);
    border-radius: 18px;
    padding: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .col-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }

  .col-title { font-weight: 700; font-size: 0.95rem; flex: 1; }

  .col-badge {
    background: #1a1a1a;
    color: #fff;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    min-width: 22px;
    text-align: center;
  }

  .col-add {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 8px;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .col-add:hover { border-color: #1a1a1a; color: #1a1a1a; background: var(--bg); }

  /* ── CARD ── */
  .card {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    background: #fafaf8;
    transition: box-shadow 0.15s, transform 0.15s;
    animation: pop 0.18s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); transform: translateY(-1px); }
  .card.done { opacity: 0.5; }
  .card.done .card-text { text-decoration: line-through; }

  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .prio-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .card-text { flex: 1; font-size: 0.88rem; line-height: 1.4; }

  .card-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
  .card:hover .card-actions { opacity: 1; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 0.85rem; padding: 3px 5px; border-radius: 6px; transition: background 0.1s; }
  .btn-icon:hover { background: #f0f0f0; }
  .btn-icon.del { color: var(--muted); font-size: 1.1rem; line-height: 1; }
  .btn-icon.del:hover { color: #e55; background: #fde8e7; }

  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }

  .owner { font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .deadline { font-size: 0.72rem; color: var(--muted); }
  .deadline.soon { color: #f59e0b; font-weight: 600; }
  .deadline.expired { color: #e55; font-weight: 600; }

  .check-label { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); cursor: pointer; margin-left: auto; user-select: none; }
  .check-label input { accent-color: #6bbf8e; cursor: pointer; }

  .card-comment { font-size: 0.77rem; color: var(--muted); background: var(--bg); border-radius: 8px; padding: 6px 10px; line-height: 1.4; margin-top: 4px; }

  .empty { font-size: 0.82rem; color: var(--muted); text-align: center; padding: 12px 0; }
  .empty button { background: none; border: none; color: #6bbf8e; font-weight: 600; cursor: pointer; font-size: 0.82rem; }
  .empty button:hover { text-decoration: underline; }

  /* ── MODALS ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.visible { display: flex; }

  .modal { background: #fff; border-radius: 20px; padding: 28px; width: 90%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); animation: modalIn 0.18s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; margin-bottom: 20px; }

  .fg { margin-bottom: 14px; }
  .fg label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .fg input, .fg select, .fg textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    color: var(--text); outline: none; background: #fff; transition: border-color 0.15s;
  }
  .fg input:focus, .fg select:focus, .fg textarea:focus { border-color: #1a1a1a; }
  .fg textarea { resize: vertical; min-height: 70px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-sec { border: 1.5px solid var(--border); background: #fff; border-radius: 10px; padding: 9px 20px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; color: var(--muted); }
  .btn-sec:hover { background: var(--bg); }
  .btn-pri { background: #1a1a1a; color: #fff; border: none; border-radius: 10px; padding: 9px 24px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-pri:hover { opacity: 0.85; }
  .btn-danger { background: #e55; color: #fff; border: none; border-radius: 10px; padding: 9px 24px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-danger:hover { opacity: 0.85; }

  .confirm-text { font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; color: var(--text); }

  /* ── CAT COLORS ── */
  .col[data-cat="Business"] .col-title { color: #6366f1; }
  .col[data-cat="RH"]       .col-title { color: #e8544a; }
  .col[data-cat="AD"]        .col-title { color: #f59e0b; }
  .col[data-cat="Autres"]   .col-title { color: #6bbf8e; }

  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px)  { .grid { grid-template-columns: 1fr; padding: 16px; } .row2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>Gestionnaire de Tâches Baptiste</h1>
  <span id="sync">⏳ Connexion…</span>
</div>

<div class="grid">
  <!-- 4 colonnes générées -->
</div>

<!-- MODAL AJOUT -->
<div class="overlay" id="addModal">
  <div class="modal">
    <h3>Nouvelle tâche</h3>
    <div class="fg"><label>Tâche *</label><input type="text" id="addText" placeholder="Décris la tâche…" /></div>
    <div class="row2">
      <div class="fg"><label>Catégorie</label>
        <select id="addCat"><option>Business</option><option>RH</option><option>AD</option><option>Autres</option></select>
      </div>
      <div class="fg"><label>Priorité</label>
        <select id="addPrio"><option value="haute">🔴 Haute</option><option value="moyenne" selected>🟡 Moyenne</option><option value="basse">🟢 Basse</option></select>
      </div>
    </div>
    <div class="row2">
      <div class="fg"><label>Responsable</label>
        <select id="addOwner"><option value="">— Aucun —</option><option>Baptiste</option><option>Nicolas</option><option>Antoine</option></select>
      </div>
      <div class="fg"><label>Faire avant le</label><input type="date" id="addDeadline" /></div>
    </div>
    <div class="fg"><label>Commentaire</label><textarea id="addComment" placeholder="Contexte, note…"></textarea></div>
    <div id="addForm" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn-sec" onclick="closeAdd()">Annuler</button>
      <button class="btn-pri" onclick="submitAdd()">Ajouter ✓</button>
    </div>
  </div>
</div>

<!-- MODAL ÉDITION -->
<div class="overlay" id="editModal">
  <div class="modal">
    <h3>Modifier la tâche</h3>
    <input type="hidden" id="editId" />
    <div class="fg"><label>Tâche *</label><input type="text" id="editText" /></div>
    <div class="row2">
      <div class="fg"><label>Catégorie</label>
        <select id="editCat"><option>Business</option><option>RH</option><option>AD</option><option>Autres</option></select>
      </div>
      <div class="fg"><label>Priorité</label>
        <select id="editPrio"><option value="haute">🔴 Haute</option><option value="moyenne">🟡 Moyenne</option><option value="basse">🟢 Basse</option></select>
      </div>
    </div>
    <div class="row2">
      <div class="fg"><label>Responsable</label>
        <select id="editOwner"><option value="">— Aucun —</option><option>Baptiste</option><option>Nicolas</option><option>Antoine</option></select>
      </div>
      <div class="fg"><label>Faire avant le</label><input type="date" id="editDeadline" /></div>
    </div>
    <div class="fg"><label>Commentaire</label><textarea id="editComment" placeholder="Contexte, note…"></textarea></div>
    <div class="modal-footer">
      <button class="btn-sec" onclick="closeEdit()">Annuler</button>
      <button class="btn-pri" onclick="submitEdit()">Enregistrer ✓</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMATION -->
<div class="overlay" id="confirmModal">
  <div class="modal">
    <h3>Confirmation</h3>
    <p class="confirm-text" id="confirmMsg"></p>
    <div class="modal-footer">
      <button class="btn-sec" onclick="cancelDelete()">Annuler</button>
      <button class="btn-danger" onclick="doDelete()">Supprimer</button>
    </div>
  </div>
</div>

<script>
  // Génère les 4 colonnes
  const CATS = ['Business', 'RH', 'AD', 'Autres'];
  const grid = document.querySelector('.grid');
  CATS.forEach(cat => {
    grid.innerHTML += `
      <div class="col" data-cat="${cat}">
        <div class="col-header">
          <span class="col-title">${cat}</span>
          <span class="col-badge" id="badge-${cat}" style="display:none">0</span>
        </div>
        <div id="list-${cat}"></div>
        <button class="col-add" onclick="openAdd('${cat}')">+ Ajouter une tâche</button>
      </div>`;
  });
</script>

</body>
</html>
